<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OptiCrop - Find Your Crop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="logo">🌱 OptiCrop</div>
    <div class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('find_your_crop') }}">Find Your Crop</a>
    </div>
  </nav>

  <section class="content">
    <h2>Enter Soil & Environmental Details</h2>
    <form method="POST" class="crop-form">
      <label>Nitrogen (N)</label>
      <input type="number" step="any" name="nitrogen" required>

      <label>Phosphorous (P)</label>
      <input type="number" step="any" name="phosphorous" required>

      <label>Potassium (K)</label>
      <input type="number" step="any" name="potassium" required>

      <label>Temperature (°C)</label>
      <input type="number" step="any" name="temperature" required>

      <label>Humidity (%)</label>
      <input type="number" step="any" name="humidity" required>

      <label>pH Level</label>
      <input type="number" step="any" name="ph" required>

      <label>Rainfall (mm)</label>
      <input type="number" step="any" name="rainfall" required>

      <button type="submit" class="btn">Predict Crop</button>
    </form>

    {% if prediction %}
    <div class="result-box">
      <h3>Recommended Crop: {{ prediction }}</h3>
    </div>
    {% endif %}
  </section>
</body>
</html>
